<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="day14activity2.css">
</head>

<body>

<div class="main container">

    <!-- Header (Logo) -->
    <div class="header d-flex justify-content-between align-items-center">
        <span class="logo">Logo</span>

        <!-- Menu -->
        <div>
            <button class="btn btn-primary" onclick="showProfile()">Student Profile</button>
            <button class="btn btn-success" onclick="showTimeTable()">TimeTable</button>
        </div>
    </div>

    <!-- Content -->
    <div class="content mt-3">

        <!-- Welcome -->
        <div id="welcome">
            <h3 class="text-center">Welcome to Student Portal</h3>
        </div>

        <!-- Profile -->
        <div id="profile" style="display:none;">
            <div class="profile-container">

                <!-- Image -->
                <div class="image-box">
                    Student Image
                </div>

                <!-- Info -->
                <div class="info-box">
                    <h4>Student Information</h4>
                    <p>Name: Gopi Krishna</p>
                    <p>Class: 10th</p>
                    <p>School: Spring Flowers</p>
                </div>

            </div>
        </div>

        <!-- TimeTable -->
        <div id="timetable" style="display:none;">
            <h4 class="text-center">Time Table</h4>

            <table class="table table-bordered mt-3">
                <tr>
                    <th>Day</th>
                    <th>Subject</th>
                </tr>
                <tr>
                    <td>Monday</td>
                    <td>Math</td>
                </tr>
                <tr>
                    <td>Tuesday</td>
                    <td>Science</td>
                </tr>
                <tr>
                    <td>Wednesday</td>
                    <td>English</td>
                </tr>
            </table>
        </div>

    </div>

</div>

<script src="day14activity2.js"></script>

</body>
</html>
