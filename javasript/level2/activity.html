<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
            const salaries = [45000, 67000, 36000];

            const incrementSalary = (salary) => salary + 1000;

            const newSalaries = salaries.map(incrementSalary);

            document.writeln("New Salary using pure function: " + newSalaries + "<br>");

            const isHighlyPaid = (salary) => salary > 50000;

            const highlyPaidEmployees = salaries.filter(isHighlyPaid);

            document.writeln("Highly paid employees using pure function: " + highlyPaidEmployees + "<br>");

            const totalSalary = salaries.reduce((total, salary) => total + salary, 0);

            document.writeln("Total salary using pure function: " + totalSalary + "<br>");

    </script>
    
</body>
</html>
